<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi Cracker</title>
    <style>
        body {
            background-color: #0d1117;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 15px;
            overflow-x: hidden;
        }

        h2 {
            text-align: center;
            color: #ff3e3e;
            text-shadow: 0 0 5px #ff0000;
            margin-top: 0;
        }

        .btn {
            background-color: #1f6feb;
            color: white;
            border: none;
            padding: 12px;
            width: 100%;
            font-size: 16px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            border-radius: 5px;
            margin-bottom: 15px;
            cursor: pointer;
            box-shadow: 0 0 10px #1f6feb;
        }

        .btn-root {
            background-color: #ff3e3e;
            box-shadow: 0 0 10px #ff3e3e;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .network-list {
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid #30363d;
            padding: 5px;
            margin-bottom: 15px;
            background: #161b22;
        }

        .network-item {
            border-bottom: 1px dashed #00ff00;
            padding: 10px 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .network-item:last-child {
            border-bottom: none;
        }

        .wifi-info strong {
            color: #58a6ff;
            font-size: 16px;
        }

        .wifi-info span {
            font-size: 12px;
            color: #8b949e;
            display: block;
        }

        .crack-btn {
            background-color: #238636;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 3px;
            font-family: monospace;
            cursor: pointer;
        }

        #terminal {
            background-color: #000;
            border: 1px solid #00ff00;
            padding: 10px;
            height: 200px;
            overflow-y: auto;
            font-size: 13px;
            line-height: 1.4;
        }

        .status-text {
            text-align: center;
            font-size: 12px;
            color: #8b949e;
            margin-bottom: 10px;
        }
    </style>
</head>

<body>

    <h2>⚡ WIFI CRACKER ⚡</h2>
    <div id="perms-status" class="status-text">Checking permissions...</div>

    <button class="btn" onclick="scanNetworks()">[1] SCAN NETWORKS</button>
    <button class="btn btn-root" onclick="showRootPasswords()">[2] ROOT SAVED PASSWORDS</button>

    <div class="network-list" id="networks">
        <div class="status-text" style="margin-top: 100px;">No networks scanned yet.</div>
    </div>

    <div id="terminal">
        root@android:~# System initialized.<br>
        root@android:~# Waiting for commands...<br>
    </div>

    <script>
        const terminal = document.getElementById('terminal');

        function logToTerminal(msg, color = "#00ff00") {
            terminal.innerHTML += `<span style="color:${color}">${msg}</span><br>`;
            terminal.scrollTop = terminal.scrollHeight; // Auto-scroll to bottom
        }

        // Android permission callback
        window.onPermsReady = function () {
            document.getElementById('perms-status').innerText = "Permissions Granted. Ready to scan.";
            document.getElementById('perms-status').style.color = "#00ff00";
        };

        // Android Crack Event callback from WifiBridge.kt
        window.onCrackEvent = function (event, data) {
            if (event === 'status') {
                logToTerminal(`[*] ${data}`, "#58a6ff");
            } else if (event === 'phase') {
                logToTerminal(`[+] ${data}`, "#d2a8ff");
            } else if (event === 'try') {
                try {
                    let info = JSON.parse(data);
                    logToTerminal(`[TRY] Testing Key: <span style="color:yellow; font-weight:bold;">${info.key}</span> [${info.source}]`);
                } catch (e) {
                    logToTerminal(`[TRY] ${data}`);
                }
            } else if (event === 'done') {
                logToTerminal(`[✓] ${data}`, "#3fb950");
                logToTerminal(`root@android:~# Waiting for next target...`);
            }
        };

        // Scan Networks
        function scanNetworks() {
            document.getElementById('networks').innerHTML = "<div class='status-text' style='margin-top: 100px;'>Scanning nearby networks...</div>";
            logToTerminal("root@android:~# iwlist wlan0 scan");

            try {
                // Call Kotlin function
                let result = Android.scan();
                let nets = JSON.parse(result);

                let html = "";
                if (nets.length === 0) {
                    html = "<div class='status-text' style='margin-top: 100px;'>No networks found!</div>";
                } else {
                    nets.forEach(net => {
                        html += `
                        <div class="network-item">
                            <div class="wifi-info">
                                <strong>${net.ssid}</strong>
                                <span>MAC: ${net.bssid} | Lvl: ${net.level}</span>
                                <span>SEC: ${net.security}</span>
                            </div>
                            <button class="crack-btn" onclick="startCracking('${net.ssid}', '${net.bssid}', '${net.security}')">CRACK</button>
                        </div>`;
                    });
                }
                document.getElementById('networks').innerHTML = html;
                logToTerminal(`[+] Found ${nets.length} networks nearby.`, "#3fb950");

            } catch (e) {
                logToTerminal("[!] Error scanning: " + e, "#ff3e3e");
            }
        }

        // Start Cracking
        function startCracking(ssid, bssid, security) {
            terminal.innerHTML = ""; // clear terminal
            logToTerminal(`root@android:~# aircrack-ng -b ${bssid} ${ssid}`);

            try {
                // Call Kotlin function
                Android.crackNetwork(ssid, bssid, security);
            } catch (e) {
                logToTerminal("[!] Engine error: " + e, "#ff3e3e");
            }
        }

        // Show Root Passwords
        function showRootPasswords() {
            terminal.innerHTML = "";
            logToTerminal(`root@android:~# cat /data/misc/wifi/WifiConfigStore.xml`);

            try {
                if (!Android.isRooted()) {
                    logToTerminal("[!] Device is NOT ROOTED. Cannot extract saved passwords.", "#ff3e3e");
                    return;
                }

                let result = Android.getRootPasswords();
                let pwds = JSON.parse(result);

                if (pwds.error) {
                    logToTerminal(`[!] Error: ${pwds.error}`, "#ff3e3e");
                    return;
                }

                if (pwds.length === 0) {
                    logToTerminal("[-] No saved passwords found.");
                } else {
                    logToTerminal(`[+] Extracted ${pwds.length} saved profiles:`, "#3fb950");
                    pwds.forEach(p => {
                        logToTerminal(`SSID: <span style="color:#58a6ff">${p.ssid}</span> | PASS: <span style="color:yellow">${p.password}</span> | TYPE: ${p.type}`);
                    });
                }
            } catch (e) {
                logToTerminal("[!] Root module error: " + e, "#ff3e3e");
            }
        }
    </script>
</body>

</html>
