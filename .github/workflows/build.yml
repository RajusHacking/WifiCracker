name: Build WifiCracker APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Show project structure (DEBUG)
        run: |
          echo "=== Root directory ==="
          ls -la
          echo "=== app directory ==="
          ls -la app/ || echo "no app folder"
          echo "=== settings.gradle ==="
          cat settings.gradle || echo "no settings.gradle"

      - name: Build with Gradle (verbose)
        run: ./gradlew assembleDebug --stacktrace --info

      - name: Find ALL APK files (DEBUG)
        if: always()
        run: |
          echo "=== Searching for APK files everywhere ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "NO APK FOUND ANYWHERE"
          echo "=== build/outputs structure ==="
          find . -path "*/build/outputs*" -type d 2>/dev/null || echo "no outputs folder"
          echo "=== Full build tree ==="
          find . -path "*/build/*" -type f 2>/dev/null | head -50

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: WifiCracker-debug
          path: '**/*.apk'
          if-no-files-found: error