name: Build APK

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: List project files (DEBUG)
        run: |
          echo "=== Root files ==="
          ls -la
          echo "=== App folder ==="
          ls -la app/ || echo "NO app/ FOLDER!"
          echo "=== Gradle wrapper ==="
          ls -la gradle/wrapper/ || echo "NO gradle wrapper!"

      - name: Generate Gradle Wrapper if missing
        run: |
          if [ ! -f "./gradlew" ]; then
            echo "gradlew missing, generating..."
            gradle wrapper
          fi
          chmod +x ./gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Find APK
        run: find . -name "*.apk" -type f

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: WifiCracker-debug
          path: '**/*.apk'